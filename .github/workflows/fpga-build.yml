name: Onyx V2 FPGA Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  synthesize:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Install OSS CAD Suite (Yosys + nextpnr + IceStorm)
      run: |
        # Get latest release from GitHub API
        LATEST=$(curl -s https://api.github.com/repos/YosysHQ/oss-cad-suite-build/releases/latest | grep "browser_download_url.*linux-x64" | cut -d'"' -f4 | head -1)
        echo "Downloading: $LATEST"
        wget -q "$LATEST"
        tar -xzf oss-cad-suite-linux-x64-*.tgz
        echo "$PWD/oss-cad-suite/bin" >> $GITHUB_PATH
    
    - name: Run Yosys synthesis
      run: |
        mkdir -p build
        yosys -v 3 -l build/yosys.log scripts/synthesize_onyx.ys 2>&1 | tee build/synthesis_output.txt
    
    - name: Resource report
      run: |
        echo "## Resource Report" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        grep -E "(number of cells|Number of|LUT|FF|SB_IO|SB_GB)" build/yosys.log | head -30 >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
    
    - name: Run Icarus Verilog simulation
      run: |
        sudo apt-get update -qq && sudo apt-get install -y -qq iverilog
        iverilog -g2012 -o build/sim_v2 tb/tb_onyx_core_v2.v rtl/nco_oscillator.v rtl/voting_unit.v rtl/onyx_core.v 2>&1 | tee build/iverilog.log
        cd build && vvp sim_v2 2>&1 | tee simulation.txt
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: onyx-v2-build
        path: build/
    
    - name: Summary
      run: |
        echo "## Onyx V2 FPGA Build" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Synthesis Log" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        tail -30 build/yosys.log >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Simulation Results" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        cat build/simulation.txt >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
